[pytest]
# Configuração do pytest para a QuantInvest Suite
# Cole este arquivo na raiz do repositório

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exibir saída de print() durante os testes (útil para debug)
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=core
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# Markers customizados (evita warnings de marker desconhecido)
markers =
    unit: Testes unitários isolados
    integration: Testes de integração entre módulos
    regression: Testes de regressão (bugs corrigidos)
    slow: Testes demorados (simulações com muitos dados)
